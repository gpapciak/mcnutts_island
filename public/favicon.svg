<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Deeper, richer sky so white tower pops -->
    <linearGradient id="skyA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6a8a"/>
      <stop offset="100%" stop-color="#6a9ab8"/>
    </linearGradient>
    <linearGradient id="waterA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e5a78"/>
      <stop offset="100%" stop-color="#1e3f58"/>
    </linearGradient>
  </defs>

  <!-- Sky — now takes y=0 to y=76 (water was 32, now 24, so sky+land gets extra 8px) -->
  <rect x="0" y="0" width="100" height="76" fill="url(#skyA)"/>

  <!-- Water — reduced from 32 to 24px tall -->
  <rect x="0" y="76" width="100" height="24" fill="url(#waterA)"/>

  <!-- Horizon shimmer -->
  <path d="M0 77 Q50 75, 100 77" stroke="#5a8fac" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Hill / headland — pushed down to match new horizon -->
  <path d="M0 76 Q20 60, 45 58 Q65 56, 100 64 L100 76 Z" fill="#2a3828"/>

  <!-- Lighthouse tower - tapered, bright white for max contrast -->
  <path d="M44 58 L42 20 L52 20 L54 58 Z" fill="#f4f4ee"/>

  <!-- Tower outline for extra crispness against sky -->
  <path d="M44 58 L42 20 L52 20 L54 58 Z" fill="none" stroke="#c8c8be" stroke-width="0.5"/>

  <!-- Tower shading (subtle) -->
  <path d="M44 58 L42 20 L45 20 L47 58 Z" fill="#d0d0c8" opacity="0.35"/>

  <!-- Lantern room - bold red -->
  <rect x="41" y="15" width="12" height="6" rx="1" fill="#cc2828"/>
  <!-- Lantern glass -->
  <rect x="42" y="16" width="10" height="4" rx="0.5" fill="#d0eaf4" opacity="0.9"/>

  <!-- Gallery railing -->
  <rect x="40" y="20" width="14" height="1.5" rx="0.5" fill="#666"/>

  <!-- Door -->
  <rect x="46" y="50" width="4" height="7" rx="1" fill="#2a3828"/>

  <!-- Window -->
  <rect x="46" y="34" width="3" height="4" rx="0.5" fill="#c8e4f0" opacity="0.8"/>

  <!-- Spruce trees -->
  <polygon points="30,58 33,49 36,58" fill="#1e2e1c"/>
  <polygon points="28,58 33,46 38,58" fill="#1e2e1c"/>
  <polygon points="62,62 65,54 68,62" fill="#1e2e1c"/>
  <polygon points="60,62 65,51 70,62" fill="#1e2e1c"/>
</svg>
